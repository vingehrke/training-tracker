name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
      - name: Build IPA
        run: uv run flet build ipa --no-codesign --project "Training Tracker" --org com.training.tracker
      - uses: actions/upload-artifact@v4
        with:
          name: training-tracker-ipa
          path: build/ipa/
          retention-days: 30
